app = "pricing-engine"
primary_region = "gru"
kill_signal = "SIGINT"
kill_timeout = "5s"

[experimental]
  auto_rollback = true

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LOG_LEVEL = "INFO"
  JOB_MARKET_TIMEZONE = "America/Sao_Paulo"
  JOB_MARKET_HOURS = "7-19/4"
  JOB_MARKET_DAYS = "mon-fri"
  JOB_CRYPTO_HOURS = "*/4"
  JOB_CRYPTO_DAYS = "*"

[mounts]
  source = "pricing_data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
