name: Update Investments Data

on:
  schedule:
    - cron: "0 0-2 * * *"
  workflow_dispatch:

jobs:
  update-investments:
    runs-on: ubuntu-latest
    name: Update Market Data
    timeout-minutes: 120

    steps:
      - name: Log start
        run: |
          echo "=============================================="
          echo "🚀 UPDATE INVESTMENTS WORKFLOW STARTED"
          echo "📅 Timestamp: $(date -u)"
          echo "🔗 API_BASE_URL: ${{ vars.API_BASE_URL }}"
          echo "=============================================="

      - name: Health Check
        run: |
          echo "📡 Health Check..."
          API_URL="${{ vars.API_BASE_URL }}"
          echo "Calling: ${API_URL}/health"

          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" "${API_URL}/health" --max-time 30)
          HTTP_CODE=$(echo "$RESP" | grep HTTP_CODE | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v HTTP_CODE)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed!"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: History Status
        run: |
          echo "📜 History Status..."
          API_URL="${{ vars.API_BASE_URL }}"
          API_KEY="${{ secrets.API_AUTH_TOKEN }}"

          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            "${API_URL}/investments/history-status" \
            -H "X-API-Key: ${API_KEY}" \
            --max-time 30)
          HTTP_CODE=$(echo "$RESP" | grep HTTP_CODE | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v HTTP_CODE)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

      - name: Update Cache
        run: |
          echo "🔄 Updating investments cache..."
          API_URL="${{ vars.API_BASE_URL }}"
          API_KEY="${{ secrets.API_AUTH_TOKEN }}"

          echo "Calling: POST ${API_URL}/investments/update-cache"

          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            -X POST \
            "${API_URL}/investments/update-cache" \
            -H "X-API-Key: ${API_KEY}" \
            -H "Content-Type: application/json" \
            --max-time 7200)
          HTTP_CODE=$(echo "$RESP" | grep HTTP_CODE | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v HTTP_CODE)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Update failed!"
            exit 1
          fi
          echo "✅ Update completed"

      - name: Verify Update
        run: |
          echo "✅ Verify..."
          API_URL="${{ vars.API_BASE_URL }}"
          API_KEY="${{ secrets.API_AUTH_TOKEN }}"

          RESP=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
            "${API_URL}/investments/history-status" \
            -H "X-API-Key: ${API_KEY}" \
            --max-time 30)
          HTTP_CODE=$(echo "$RESP" | grep HTTP_CODE | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v HTTP_CODE)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "✅ Done!"

      - name: Log complete
        run: |
          echo "=============================================="
          echo "🎉 COMPLETED at $(date -u)"
          echo "=============================================="
